<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>노션 스타일 협업 공간</title>
    
    <!-- 💾 1. 외부 통합 스타일시트 연동 -->
    <link rel="stylesheet" th:href="@{/css/editor.css}">
    
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>
    <div id="workspace-info" th:data-workspace-id="${workspaceId}" th:data-visitor="${isVisitor}" th:data-user-id="${myUserId}" style="display:none;"></div>
    <!-- 왼쪽 사이드바 영역 -->
    <div class="sidebar" id="sidebar">
        <button class="toggle-btn" id="toggleBtn" onclick="toggleSidebar()">◀</button>
        <a th:href="@{/workspaces}" class="home-btn">
            <span style="font-size: 16px;">🏠</span>
            <span>홈</span>
        </a>

        <!-- 접속 중인 유저 -->
        <div id="presence-panel" class="presence-panel">
            <div id="presence-list" class="presence-list"></div>
        </div>

        <!-- ✨ 워크스페이스 정보 바 -->
        <div class="workspace-header">
            <div class="workspace-title" th:text="${workspaceName}">워크스페이스 이름</div>
            <div class="workspace-user-row">
                <span class="user-badge">
                    <span th:text="${myName}">유저</span>
                    <span class="role-chip" th:classappend="${myRole}" th:text="${myRole}">ROLE</span>
                </span>
                <button th:if="${isOwner}" class="member-manage-btn" onclick="openMemberModal()">멤버 관리</button>
            </div>
        </div>

        <h3>새 문서</h3>
        <div class="create-form" th:unless="${isVisitor}">
            <form th:action="@{/workspaces/{wsId}/documents/create(wsId=${workspaceId})}" method="post">
                <input type="text" name="title" class="create-input" placeholder="새 문서 제목..." required>
                <button type="submit" class="create-btn">+ 문서 추가</button>
            </form>
        </div>
        <p th:if="${isVisitor}" style="padding: 8px; font-size: 12px; color: #999;">
        🔒 읽기 전용 권한입니다
        </p>

        <h3>문서 목록</h3>
        <ul class="doc-list">
            <li th:if="${#lists.isEmpty(documents)}" style="padding: 8px; font-size: 13px; color: #91908c;">
                생성된 문서가 없습니다.
            </li>
            <li th:unless="${#lists.isEmpty(documents)}" th:each="doc : ${documents}">
                <a th:href="@{/workspaces/{wsId}/documents(wsId=${workspaceId}, docId=${doc.documentId})}" 
                th:classappend="${selectedDocument != null && selectedDocument.documentId == doc.documentId} ? 'active' : ''"
                class="doc-item">
                    <span class="doc-icon">📄</span>
                    <span class="sidebar-doc-title" th:data-doc-id="${doc.documentId}" th:text="${doc.title}">문서 제목</span>
                    <span class="doc-viewers" th:data-doc-id="${doc.documentId}"></span>

                    <span th:unless="${isVisitor}" class="doc-menu-btn" th:data-doc-id="${doc.documentId}" onclick="event.preventDefault(); toggleMenu(event, this)">⋮</span>
                                    
                    <div class="doc-menu-popup" th:id="'menu-' + ${doc.documentId}" style="display:none;">
                        <span class="menu-item" th:unless="${isVisitor}" th:data-doc-id="${doc.documentId}" onclick="event.preventDefault(); event.stopPropagation(); prepareRename(this)">이름 변경</span>
                        <span class="menu-item" th:if="${isOwner}" th:data-doc-id="${doc.documentId}" onclick="event.preventDefault(); event.stopPropagation(); deleteDocFromSidebar(this)">삭제</span>
                    </div>
                </a>
            </li>
        </ul>
    </div>

    <!-- 오른쪽 메인 콘텐츠 영역 -->
    <div class="main-content">
        <div th:if="${selectedDocument == null}" class="empty-state">
            <h2>📝 나만의 지식 저장소</h2>
            <p>왼쪽 사이드바에서 문서를 선택하거나 새 문서를 추가하여 협업을 시작해 보세요!</p>
        </div>

        <div th:unless="${selectedDocument == null}" class="editor-container">
            <div class="title-wrapper" style="display: flex; align-items: center; gap: 10px;">
                <!-- 읽기 전용 제목 -->
                <h1 id="display-title" th:text="${selectedDocument.title}">문서 제목</h1>
                
                <!-- 편집용 인풋 (평소엔 숨김) -->
                <input type="text" id="edit-title-input" th:value="${selectedDocument.title}" 
                    style="display: none; font-size: 2em; font-weight: bold; border: 1px solid #ccc; padding: 5px;">
                
                <!-- 수정 버튼 (아이콘 디자인) -->
                <button th:unless="${isVisitor}" id="edit-title-btn" class="edit-btn" th:data-doc-id="${selectedDocument.documentId}">✏️</button>
            </div>
            <div class="editor-meta">
                최종 수정: <span th:text="${#temporals.format(selectedDocument.updatedAt, 'yyyy-MM-dd HH:mm:ss')}">수정일</span>
            </div>

            <!-- 에디터 블록 컨테이너 -->
            <div id="editor-blocks" style="display:flex; flex-direction:column; flex:1; gap: 4px;">
                <div th:each="block : ${selectedDocument.blocks}" class="block-wrapper">
                    
                    <!-- ➕ ⠿ 블록 왼쪽의 액션 영역 (드래그 핸들 추가) -->
                    <div class="block-actions" contenteditable="false">
                        <button class="plus-btn" th:onclick="'toggleBlockMenu(event, ' + ${block.blockId} + ')'">＋</button>
                        
                        <!-- ⠿ 점 6개 드래그 핸들 버튼 (여기를 잡아야만 드래그가 되도록 지정할 겁니다) -->
                        <div class="drag-handle" style="cursor: grab; color: #91908c; padding: 2px 4px; font-size: 14px; user-select: none;">⠿</div>
                        
                        <!-- 팝업될 타입 변경 메뉴 (기존 그대로 유지) -->
                        <div th:id="'menu-' + ${block.blockId}" class="block-menu">
                            <button type="button" class="menu-item" th:onclick="'changeBlockTypeFromMenu(' + ${block.blockId} + ', \'H1\')'"><span class="menu-icon">H1</span> 대제목</button>
                            <button type="button" class="menu-item" th:onclick="'changeBlockTypeFromMenu(' + ${block.blockId} + ', \'H2\')'"><span class="menu-icon">H2</span> 중제목</button>
                            <button type="button" class="menu-item" th:onclick="'changeBlockTypeFromMenu(' + ${block.blockId} + ', \'H3\')'"><span class="menu-icon">H3</span> 소제목</button>
                            <button type="button" class="menu-item" th:onclick="'changeBlockTypeFromMenu(' + ${block.blockId} + ', \'TEXT\')'"><span class="menu-icon">T</span> 본문 텍스트</button>
                        </div>
                    </div>

                    <!-- ✍️ 실제 에디터 블록 영역 (기존 그대로 유지) -->
                    <div th:if="${!isVisitor}"
                        th:id="'block-' + ${block.blockId}"
                        th:data-block-id="${block.blockId}"
                        th:data-block-type="${block.blockType}"
                        th:data-sequence-order="${block.sequenceOrder}"
                        contenteditable="true"
                        class="editor-block-item"
                        th:classappend="${#strings.toLowerCase(block.blockType)}"
                        th:text="${block.content}"
                        placeholder="명령어 사용은 '/' 입력"></div>

                    <div th:if="${isVisitor}"
                        th:id="'block-' + ${block.blockId}"
                        th:data-block-id="${block.blockId}"
                        th:data-block-type="${block.blockType}"
                        th:data-sequence-order="${block.sequenceOrder}"
                        contenteditable="false"
                        class="editor-block-item"
                        th:classappend="${#strings.toLowerCase(block.blockType)}"
                        th:text="${block.content}"
                        placeholder="명령어 사용은 '/' 입력"></div>
                </div>
            </div>
            
            <div class="save-bar" id="sync-status" style="color: #91908c; font-size: 13px; margin-top: 20px;">
                🟢 연결됨
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="memberModal">
        <div class="modal-box">
            <h3>워크스페이스 멤버 관리</h3>
            <div id="memberList"></div>
            <button class="modal-close-btn" onclick="closeMemberModal()">닫기</button>
        </div>
    </div>

    <script th:inline="javascript">
        const currentWorkspaceId = /*[[${workspaceId}]]*/ null;

        function openMemberModal() {
            fetch(`/workspaces/${currentWorkspaceId}/members`)
                .then(res => res.json())
                .then(data => {
                    if (!data.success) {
                        alert("❌ " + data.message);
                        return;
                    }
                    renderMembers(data.members);
                    document.getElementById('memberModal').style.display = 'flex';
                })
                .catch(() => alert("멤버 목록을 불러오지 못했습니다."));
        }

        function renderMembers(members) {
            const container = document.getElementById('memberList');
            container.innerHTML = '';

            members.forEach(m => {
                const row = document.createElement('div');
                row.className = 'member-row';

                const isOwner = m.role === 'OWNER';

                row.innerHTML = `
                    <div class="member-info">
                        <strong>${m.name}</strong>
                        <div>${m.username} · ${m.role}</div>
                    </div>
                    <div class="member-actions">
                        ${isOwner ? '' : `
                            <select onchange="changeRole(${m.memberId}, this.value)">
                                <option value="MEMBER" ${m.role === 'MEMBER' ? 'selected' : ''}>MEMBER</option>
                                <option value="VISITOR" ${m.role === 'VISITOR' ? 'selected' : ''}>VISITOR</option>
                            </select>
                            <button class="kick-btn" onclick="kickMember(${m.memberId})">퇴출</button>
                        `}
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function kickMember(memberId) {
            if (!confirm("정말 이 멤버를 퇴출하시겠습니까?")) return;

            fetch(`/workspaces/${currentWorkspaceId}/members/${memberId}/kick`, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if (data.success) openMemberModal();
                    else alert("❌ " + data.message);
                });
        }

        function changeRole(memberId, newRole) {
            fetch(`/workspaces/${currentWorkspaceId}/members/${memberId}/role`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role: newRole })
            })
                .then(res => res.json())
                .then(data => {
                    if (!data.success) {
                        alert("❌ " + data.message);
                        openMemberModal();
                    }
                });
        }

        function closeMemberModal() {
            document.getElementById('memberModal').style.display = 'none';
        }
    </script>

    <!-- 모듈 초기화 메인 스크립트 -->
    <script type="module">
        import '/js/ui.js'

        import { connectWebSocket } from '/js/websocket.js';

        // 타겟 문서 ID를 주입하여 에디터 전동 엔진 가동!
        const docId = "[[${selectedDocument?.documentId}]]"; // null 방지를 위해 안전하게 처리
        connectWebSocket(docId);
    </script>
</body>
</html>
