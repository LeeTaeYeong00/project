<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body class="auth-body">
    <div class="auth-card">
        <div class="auth-logo">📝 노션 스타일 협업 공간</div>
        <div class="auth-title">로그인</div>
        <div class="auth-subtitle">계속하려면 계정 정보를 입력하세요</div>

        <div th:if="${param.error}" class="auth-alert error">아이디 또는 비밀번호가 올바르지 않습니다.</div>
        <div th:if="${param.logout}" class="auth-alert info">로그아웃 되었습니다.</div>

        <form th:action="@{/users/login}" method="post">
            <div class="auth-form-group">
                <label class="auth-label" th:for="username">아이디</label>
                <input type="text" class="auth-input" name="username" id="username" required>
            </div>
            <div class="auth-form-group">
                <label class="auth-label" th:for="password">비밀번호</label>
                <input type="password" class="auth-input" name="password" id="password" required>
            </div>
            <button type="submit" class="auth-submit-btn">로그인</button>
        </form>

        <div class="auth-footer">
            아직 계정이 없으신가요? <a th:href="@{/users/register}">회원가입하러 가기</a>
        </div>
    </div>
</body>
</html>
