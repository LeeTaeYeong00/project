<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <style>
        .form-group { margin-bottom: 15px; }
        .error-msg { color: red; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

<h2>로그인</h2>

<div th:if="${param.error}" class="error-msg">
    <p>아이디 또는 비밀번호가 올바르지 않습니다.</p>
</div>

<div th:if="${param.logout}" style="color: blue; margin-bottom: 15px;">
    <p>로그아웃 되었습니다.</p>
</div>

<form th:action="@{/users/login}" method="post">
    
    <div class="form-group">
        <label th:for="username">아이디</label><br>
        <input type="text" name="username" id="username" required>
    </div>

    <div class="form-group">
        <label th:for="password">비밀번호</label><br>
        <input type="password" name="password" id="password" required>
    </div>

    <button type="submit" style="padding: 10px 20px;">로그인</button>
    
    <hr style="margin: 20px 0;">
    <p>아직 계정이 없으신가요? <a th:href="@{/users/register}">회원가입하러 가기</a></p>
</form>

</body>
</html>
