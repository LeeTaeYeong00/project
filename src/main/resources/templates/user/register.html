<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .error-msg { color: red; font-size: 0.9em; }
        .success-msg { color: green; font-size: 0.9em; }
        .form-group { margin-bottom: 15px; }
    </style>
</head>
<body>
    <h2>회원가입</h2>
    <div th:if="${errorMessage}" style="color: red; font-weight: bold; margin-bottom: 15px;">
        <p th:text="${errorMessage}"></p>
    </div>
    
    <form th:action="@{/users/register}" th:object="${userDTO}" method="post" id="registerForm">
        <div class="form-group">
            <label for="username">아이디 (ID)</label><br>
            <input type="text" th:field="*{username}" id="username" required>
            <button type="button" id="btnCheckUsername">아이디 중복확인</button>
            <div id="usernameMsg"></div>
        </div>

        <div class="form-group">
            <label for="password">비밀번호</label><br>
            <input type="password" th:field="*{password}" id="password" required>
        </div>

        <div class="form-group">
            <label for="name">이름</label><br>
            <input type="text" th:field="*{name}" id="name" required>
        </div>

        <div class="form-group">
            <label for="email">이메일</label><br>
            <input type="email" th:field="*{email}" id="email" required>
            <button type="button" id="btnCheckEmail">이메일 중복확인</button>
            <div id="emailMsg"></div>
        </div>

        <button type="submit" id="btnSubmit" disabled style="padding: 10px 20px;">가입하기</button>
    </form>

    <script>
        let isUsername = false;
        let isEmail = false;

        function toggleSubmitButton(){
            if(isUsername && isEmail){
                $('#btnSubmit').removeAttr('disabled');
            } else {
                $('#btnSubmit').attr('disabled', 'disabled');
            }
        }

        $(document).ready(function(){
            $('#btnCheckUsername').click(function(){
                const username = $('#username').val().trim();
                if(username === ""){
                    alert("아이디를 입력하세요");
                    return;
                }

                $.ajax({
                    url : '/users/check-username',
                    type : 'GET',
                    data : {username : username},
                    success : function(isExist){
                        if(isExist){
                            $('#usernameMsg').html('<span class="error-msg"> 사용 중인 아이디입니다.</span>')
                            isUsername = false;
                        } else {
                            $('#usernameMsg').html('<span class="success-msg"> 사용 가능한 아이디입니다.</span>')
                            isUsername = true;
                        }
                        toggleSubmitButton();
                    },
                    error : function(){
                        alert("오류가 발생했습니다. 다시 시도해주세요.");
                    }
                });
            });

            $('#btnCheckEmail').click(function(){
                const email = $('#email').val().trim();
                if(email === ""){
                    alert("이메일을 입력하세요");
                    return;
                }

                $.ajax({
                    url : '/users/check-email',
                    type : 'GET',
                    data : {email : email},
                    success : function(isExist){
                        if(isExist){
                            $('#emailMsg').html('<span class="error-msg"> 사용 중인 이메일입니다.</span>')
                            isEmail = false;
                        } else {
                            $('#emailMsg').html('<span class="success-msg"> 사용 가능한 이메일입니다.</span>')
                            isEmail = true;
                        }
                        toggleSubmitButton();
                    },
                    error : function(){
                        alert("오류가 발생했습니다. 다시 시도해주세요.");
                    }
                });
            });

            $('#username').on('input', function(){
                isUsername = false;
                $('#usernameMsg').empty();
                toggleSubmitButton();
            });

            $('#email').on('input', function(){
                isEmail = false;
                $('#emailMsg').empty();
                toggleSubmitButton();
            });
        });
    </script>
</body>
