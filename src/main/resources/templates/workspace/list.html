<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>워크스페이스 목록</title>
    <style>
        .workspace-card { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="header">
    <h2><span th:text="${username}">사용자</span>님의 대시보드</h2>
    <form th:action="@{/users/logout}" method="post">
        <button type="submit">로그아웃</button>
    </form>
</div>

<h3>나의 워크스페이스 목록</h3>
<button th:onclick="|location.href='@{/workspaces/create}'|" style="padding: 10px 15px; margin-bottom: 20px;">
    + 새 워크스페이스 만들기
</button>

<div th:if="${#lists.isEmpty(workspaces)}">
    <p>참여 중인 워크스페이스가 없습니다. 새 공간을 만들어보세요!</p>
</div>

<div th:unless="${#lists.isEmpty(workspaces)}">
    <div th:each="ws : ${workspaces}" class="workspace-card">
        <h4 th:text="${ws.workspaceName}">워크스페이스 이름</h4>
        <p th:text="${ws.description}">워크스페이스 설명</p>
        <button th:onclick="|location.href='@{/workspaces/' + ${ws.workspaceId} + '/documents'}'|">
            입장하기
        </button>
    </div>
</div>

</body>
</html>
