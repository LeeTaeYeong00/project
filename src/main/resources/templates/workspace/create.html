<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>새 워크스페이스 만들기</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body class="auth-body">
    <div class="auth-card">
        <div class="auth-logo">📝 노션 스타일 협업 공간</div>
        <div class="auth-title">새 워크스페이스 만들기</div>
        <div class="auth-subtitle">팀과 함께할 공간의 이름을 지어주세요</div>

        <form th:action="@{/workspaces/create}" method="post">
            <div class="auth-form-group">
                <label class="auth-label" th:for="workspaceName">워크스페이스 이름</label>
                <input type="text" class="auth-input" name="workspaceName" id="workspaceName" placeholder="예: 캡스톤 디자인 A팀" required>
            </div>
            <div class="auth-form-group">
                <label class="auth-label" th:for="description">설명</label>
                <textarea name="description" id="description" rows="4" class="auth-input" style="resize:vertical;" placeholder="어떤 목적으로 사용하는 공간인지 적어주세요."></textarea>
            </div>
            <button type="submit" class="auth-submit-btn">생성하기</button>
            <button type="button" class="auth-submit-btn" style="background:#fff;color:#37352f;border:1px solid #e2e2e0;margin-top:8px;" th:onclick="|location.href='@{/workspaces}'|">취소</button>
        </form>
    </div>
</body>
</html>
